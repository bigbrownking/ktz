version: '3.9'

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data

  simulator:
    build:
      context: .
      dockerfile: ktz-simulator/Dockerfile
    ports:
      - "${SIMULATOR_PORT}:${SIMULATOR_PORT}"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      SERVER_PORT: ${SIMULATOR_PORT}
      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST}
      SPRING_RABBITMQ_PORT: ${RABBITMQ_PORT}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      TELEMETRY_FREQUENCY_HZ: ${TELEMETRY_FREQUENCY_HZ}
      LOCO_1_NUMBER: ${LOCO_1_NUMBER}
      LOCO_1_TYPE: ${LOCO_1_TYPE}
      LOCO_1_NAME: ${LOCO_1_NAME}
      LOCO_2_NUMBER: ${LOCO_2_NUMBER}
      LOCO_2_TYPE: ${LOCO_2_TYPE}
      LOCO_2_NAME: ${LOCO_2_NAME}

  telemetry:
    build:
      context: .
      dockerfile: ktz-telemetry/Dockerfile
    ports:
      - "${TELEMETRY_PORT}:${TELEMETRY_PORT}"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: ${TELEMETRY_PORT}
      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST}
      SPRING_RABBITMQ_PORT: ${RABBITMQ_PORT}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      TELEMETRY_FREQUENCY_HZ: ${TELEMETRY_FREQUENCY_HZ}
      LOCO_1_NUMBER: ${LOCO_1_NUMBER}
      LOCO_1_TYPE: ${LOCO_1_TYPE}
      LOCO_1_NAME: ${LOCO_1_NAME}
      LOCO_2_NUMBER: ${LOCO_2_NUMBER}
      LOCO_2_TYPE: ${LOCO_2_TYPE}
      LOCO_2_NAME: ${LOCO_2_NAME}

  history:
    build:
      context: .
      dockerfile: ktz-history/Dockerfile
    ports:
      - "${HISTORY_PORT}:${HISTORY_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVER_PORT: ${HISTORY_PORT}
      SPRING_DATASOURCE_URL: ${POSTGRES_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST}
      SPRING_RABBITMQ_PORT: ${RABBITMQ_PORT}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      TELEMETRY_FREQUENCY_HZ: ${TELEMETRY_FREQUENCY_HZ}
      LOCO_1_NUMBER: ${LOCO_1_NUMBER}
      LOCO_1_TYPE: ${LOCO_1_TYPE}
      LOCO_1_NAME: ${LOCO_1_NAME}
      LOCO_2_NUMBER: ${LOCO_2_NUMBER}
      LOCO_2_TYPE: ${LOCO_2_TYPE}
      LOCO_2_NAME: ${LOCO_2_NAME}

  gateway:
    build:
      context: .
      dockerfile: ktz-gateway/Dockerfile
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      simulator:
        condition: service_started
      telemetry:
        condition: service_started
      history:
        condition: service_started
    environment:
      SERVER_PORT: ${GATEWAY_PORT}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      R2DBC_URL: r2dbc:postgresql://postgres:5432/${POSTGRES_DB}
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
      SIMULATOR_HOST: simulator
      SIMULATOR_PORT: ${SIMULATOR_PORT}
      TELEMETRY_HOST: telemetry
      TELEMETRY_PORT: ${TELEMETRY_PORT}
      HISTORY_HOST: history
      HISTORY_PORT: ${HISTORY_PORT}
      MINIO_URL: http://minio:9000
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}

volumes:
  postgres_data:
  minio_data: