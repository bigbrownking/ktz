server:
  port: ${SERVER_PORT}

minio:
  url: ${MINIO_URL:http://minio:9000}
  access-key: ${MINIO_USER:minioadmin}
  secret-key: ${MINIO_PASSWORD:minioadmin}
  bucket: ${MINIO_BUCKET:users}

spring:
  application:
    name: ktz-gateway
  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://postgres:5432/ktz}
    username: ${POSTGRES_USER:ktz}
    password: ${POSTGRES_PASSWORD:ktz}
  flyway:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB:ktz}
    user: ${POSTGRES_USER:ktz}
    password: ${POSTGRES_PASSWORD:ktz}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  cloud:
    gateway:
      routes:
        - id: simulator
          uri: http://simulator:${SIMULATOR_PORT}
          predicates:
            - Path=/simulator/**
          filters:
            - StripPrefix=1

        - id: telemetry
          uri: http://telemetry:${TELEMETRY_PORT}
          predicates:
            - Path=/telemetry/**
          filters:
            - StripPrefix=1

        - id: history
          uri: http://history:${HISTORY_PORT}
          predicates:
            - Path=/history/**
          filters:
            - StripPrefix=1

        - id: simulator-docs
          uri: http://simulator:${SIMULATOR_PORT}
          predicates:
            - Path=/simulator/v3/api-docs/**
          filters:
            - StripPrefix=1

        - id: telemetry-docs
          uri: http://telemetry:${TELEMETRY_PORT}
          predicates:
            - Path=/telemetry/v3/api-docs/**
          filters:
            - StripPrefix=1

        - id: history-docs
          uri: http://history:${HISTORY_PORT}
          predicates:
            - Path=/history/v3/api-docs/**
          filters:
            - StripPrefix=1

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
  refresh:
    expiration: ${JWT_REFRESH_EXPIRATION}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: gateway
        url: /v3/api-docs
      - name: simulator
        url: /simulator/v3/api-docs
      - name: telemetry
        url: /telemetry/v3/api-docs
      - name: history
        url: /history/v3/api-docs
  api-docs:
    enabled: true
    path: /v3/api-docs


